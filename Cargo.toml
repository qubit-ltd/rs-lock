[package]
name = "qubit-lock"
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
authors = ["Haixing Hu <starfish.hu@gmail.com>"]
license = "Apache-2.0"
repository = "https://github.com/qubit-ltd/rs-lock"
description = "Lock utilities library providing synchronous, asynchronous, and double-checked locking primitives"
homepage = "https://github.com/qubit-ltd/rs-lock"
documentation = "https://docs.rs/qubit-lock"
readme = "README.md"
keywords = ["lock", "mutex", "rwlock", "monitor", "async"]
categories = ["concurrency", "asynchronous"]
exclude = [
    "coverage.sh",
    ".circleci/*",
    "align-ci.sh",
    "ci-check.sh",
]

[lib]
name = "qubit_lock"
doctest = true

[dependencies]
tokio = { version = "1.5", features = ["sync", "rt"] }
log = "0.4"
parking_lot = "0.12"
thiserror = "2.0"
qubit-function = "0.10"

[dev-dependencies]
tokio = { version = "1.5", features = ["macros", "rt-multi-thread", "time"] }
